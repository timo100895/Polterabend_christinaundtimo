name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          status=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/bring_items?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Status: $status"

          if [ "$status" != "200" ]; then
            echo "Supabase konnte nicht erreicht werden."
            exit 1
          fi
